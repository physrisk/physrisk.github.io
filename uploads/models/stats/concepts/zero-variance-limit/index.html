<!DOCTYPE HTML>
<html lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<title>Zero variance limit of a Gaussian distribution</title>
    <link rel="stylesheet" type="text/css" href="../../../shared-libs/normalize.css">
    <link rel="stylesheet" type="text/css" href="../../../shared-libs/universal-style.css">
    <script src="../../../shared-libs/plotly-131.min.js"></script>

<body>
<div id="wrapper">
    <div id="figureWrapper">
        <div class="label">PDF (left) and CDF (right) of a Gaussian distribution</div>

        <div id="cdfPlot" class="halfSize"></div>
    </div><!-- #figureWrapper -->
    <div id="controlWrapper">
        <span class="controlBlock">

            <input id="mu" type="number" min="-1" max="1" step="0.1" value="0">
        </span>
        <span class="controlBlock">
            <label for="sigma">&sigma;<sup>2</sup> = </label>
            10^<input id="sigma" type="number" min="-4" max="1" step="0.1" value="0">
        </span>
    </div><!-- #controlWrapper -->
</div><!-- #wrapper -->
<script src="./index.js"></script>
